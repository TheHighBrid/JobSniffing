name: Verify credentials-v1 materialization

on:
  workflow_dispatch:
  push:
    branches:
      - autonomy/credentials-v1
    paths:
      - 'scripts/materialize-autonomy.sh'
      - 'overlays/credentials-v1/**'
      - 'docs/AUTONOMY_PROGRESS.md'

permissions:
  contents: read

jobs:
  materialize-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: autonomy/credentials-v1
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Materialize all autonomy layers and verify
        run: bash scripts/materialize-autonomy.sh
      - name: Confirm credential milestone
        run: |
          test -f app/services/credential_service.py
          test -f docs/credentials.md
          test -f scripts/init-credentials.sh
          python -m pytest -q tests/unit/test_credentials.py tests/unit/test_email_adapter.py
