name: Materialize verified autonomy branch

on:
  workflow_dispatch:
  push:
    branches:
      - autonomy/shared-primitives-v1

permissions:
  contents: write

concurrency:
  group: autonomy-bootstrap-${{ github.ref }}
  cancel-in-progress: false

jobs:
  materialize:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[autonomy-materialized]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: autonomy/shared-primitives-v1
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Restore Sonnet consolidation and apply autonomy overlay
        shell: bash
        run: |
          set -euo pipefail
          test -f jobsniffing-consolidation-v1.zip
          test -f .autonomy-current.part-00
          test -f .autonomy-current.part-02h

          rm -rf /tmp/jobsniffing-bootstrap
          mkdir -p /tmp/jobsniffing-bootstrap
          unzip -q jobsniffing-consolidation-v1.zip -d /tmp/jobsniffing-bootstrap
          cp -a /tmp/jobsniffing-bootstrap/JobSniffing/. ./

          cat .autonomy-current.part-* | base64 --decode | tar -xzf -

          rm -f .autonomy-current.part-*
          rm -f .autonomy-phase1.tar.gz.b64
          rm -f jobsniffing-consolidation-v1.zip jobsniffing-consolidation-v1.bundle
          rm -f .github/workflows/autonomy-bootstrap.yml
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          rm -rf .pytest_cache jobsniffing.egg-info data
          chmod +x scripts/*.sh

      - name: Install and verify
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
          sh scripts/verify.sh

      - name: Commit verified source tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'JobSniffing Autonomy Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'feat: materialize shared ATS autonomy engine [autonomy-materialized]'
          git push origin HEAD:autonomy/shared-primitives-v1
