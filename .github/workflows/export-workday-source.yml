name: Export Workday source

on:
  pull_request:
    paths:
      - ".github/workflows/export-workday-source.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Check out Workday source branch
        uses: actions/checkout@v4
        with:
          ref: autonomy/workday-v1
          fetch-depth: 0

      - name: Decode and inventory Workday overlay
        shell: bash
        run: |
          set -euo pipefail
          rm -rf workday-port-source
          mkdir -p workday-port-source/overlay
          cp -a overlays/workday-v1/. workday-port-source/overlay/
          cat overlays/workday-v1/workday-v1.patch.b64.part-* \
            | base64 --decode > workday-port-source/workday-v1-decoded.bin
          file workday-port-source/workday-v1-decoded.bin \
            | tee workday-port-source/decoded-file-type.txt
          sha256sum workday-port-source/workday-v1-decoded.bin \
            | tee workday-port-source/decoded-sha256.txt
          python - <<'PY'
          from pathlib import Path
          value = Path('workday-port-source/workday-v1-decoded.bin').read_bytes()
          Path('workday-port-source/decoded-prefix.hex').write_text(value[:128].hex())
          PY
          find workday-port-source -type f -print | sort > workday-port-source/inventory.txt

      - name: Upload decoded Workday overlay
        uses: actions/upload-artifact@v4
        with:
          name: jobsniffing-workday-decoded-overlay
          path: workday-port-source
          if-no-files-found: error
          retention-days: 7
