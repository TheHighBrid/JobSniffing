name: Export Workday source

on:
  pull_request:
    paths:
      - ".github/workflows/export-workday-source.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Check out Workday source branch
        uses: actions/checkout@v4
        with:
          ref: autonomy/workday-v1
          fetch-depth: 0

      - name: Materialize and inventory Workday source
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/materialize-autonomy.sh
          rm -rf workday-port-source
          mkdir -p workday-port-source
          cp -a app tests docs scripts README.md pyproject.toml CHECKPOINT.md workday-port-source/
          find workday-port-source -type f -print | sort > workday-port-source/inventory.txt
          grep -RIlE 'workday|myworkdayjobs|wday/cxs|wd[0-9]+\.myworkdayjobs' workday-port-source \
            | sort > workday-port-source/workday-matches.txt || true
          echo "Workday-related files:"
          cat workday-port-source/workday-matches.txt || true

      - name: Upload materialized Workday source
        uses: actions/upload-artifact@v4
        with:
          name: jobsniffing-workday-materialized
          path: workday-port-source
          if-no-files-found: error
          retention-days: 7
