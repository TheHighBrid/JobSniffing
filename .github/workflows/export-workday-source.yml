name: Export Workday source

on:
  pull_request:
    paths:
      - ".github/workflows/export-workday-source.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Check out Workday source branch
        uses: actions/checkout@v4
        with:
          ref: autonomy/workday-v1
          fetch-depth: 0

      - name: Decode and inventory Workday overlay
        shell: bash
        run: |
          set -euo pipefail
          rm -rf workday-port-source
          mkdir -p workday-port-source/overlay
          cp -a overlays/workday-v1/. workday-port-source/overlay/
          : > workday-port-source/workday-v1.patch
          for part in overlays/workday-v1/workday-v1.patch.b64.part-*; do
            base64 --decode "$part" >> workday-port-source/workday-v1.patch
          done
          file workday-port-source/workday-v1.patch \
            | tee workday-port-source/decoded-file-type.txt
          sha256sum workday-port-source/workday-v1.patch \
            | tee workday-port-source/decoded-sha256.txt
          grep '^diff ' workday-port-source/workday-v1.patch \
            > workday-port-source/changed-paths.txt || true
          find workday-port-source -type f -print | sort > workday-port-source/inventory.txt

      - name: Upload decoded Workday overlay
        uses: actions/upload-artifact@v4
        with:
          name: jobsniffing-workday-decoded-overlay
          path: workday-port-source
          if-no-files-found: error
          retention-days: 7
