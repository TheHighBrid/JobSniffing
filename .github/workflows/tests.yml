name: tests
on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[test]'
      - run: python -m pytest -q

  workday-materialization:
    if: github.ref == 'refs/heads/autonomy/workday-v1' || github.head_ref == 'autonomy/workday-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Clone exact Workday branch, materialize, and verify
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          git clone --quiet --depth 1 --branch autonomy/workday-v1 "https://github.com/${REPOSITORY}.git" workday
          cd workday
          python --version
          bash scripts/materialize-autonomy.sh
